<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simba Petshop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800">

<!-- HERO -->
<section class="min-h-screen bg-gradient-to-r from-pink-100 via-yellow-50 to-blue-100">

  <div class="max-w-7xl mx-auto px-6 py-16 flex flex-col md:flex-row items-center gap-10">

    <!-- TEXT -->
    <div class="w-full md:w-1/2 space-y-6 text-center md:text-left">

      <span class="bg-pink-200 text-pink-700 px-4 py-2 rounded-full text-sm font-semibold">
        Simba Petshop 🐾
      </span>

      <h1 class="text-4xl md:text-6xl font-bold leading-tight">
        Premium <span class="text-pink-500">Pet Toys & Accessories</span>
      </h1>

      <p class="text-gray-600 text-base md:text-lg">
        Toys, collars, beds, grooming kits — everything your pet needs to stay happy and stylish.
      </p>

      <button class="bg-pink-500 text-white px-8 py-4 rounded-xl font-semibold shadow-lg w-full md:w-auto">
        Shop Now
      </button>

    </div>

    <!-- IMAGE -->
    <div class="w-full md:w-1/2">
      <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a"
      class="rounded-3xl shadow-2xl w-full h-[350px] md:h-[500px] object-cover">
    </div>

  </div>
</section>

<!-- PRODUCTS -->
<section class="py-16 px-6">

  <div class="max-w-7xl mx-auto">

    <h2 class="text-3xl md:text-4xl font-bold text-center mb-10">
      Featured Products
    </h2>

    <!-- MOBILE = 1 COLUMN, DESKTOP = 3 COLUMNS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- PRODUCT -->
      <div class="bg-white p-5 rounded-3xl shadow-lg">
        <img src="https://images.unsplash.com/photo-1583337130417-3346a1be7dee"
        class="rounded-2xl h-56 w-full object-cover">

        <h3 class="text-xl font-bold mt-4">Dog Toy</h3>
        <p class="text-gray-500">Fun chew toy 🧸</p>

        <button onclick="addToCart('Dog Toy')"
        class="mt-4 bg-pink-500 text-white px-6 py-3 rounded-xl w-full">
          Add to Cart
        </button>
      </div>

      <div class="bg-white p-5 rounded-3xl shadow-lg">
        <img src="https://images.unsplash.com/photo-1548681528-6a5c45b66b42"
        class="rounded-2xl h-56 w-full object-cover">

        <h3 class="text-xl font-bold mt-4">Pet Collar</h3>
        <p class="text-gray-500">Stylish & adjustable 🎀</p>

        <button onclick="addToCart('Pet Collar')"
        class="mt-4 bg-pink-500 text-white px-6 py-3 rounded-xl w-full">
          Add to Cart
        </button>
      </div>

      <div class="bg-white p-5 rounded-3xl shadow-lg">
        <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a"
        class="rounded-2xl h-56 w-full object-cover">

        <h3 class="text-xl font-bold mt-4">Pet Bed</h3>
        <p class="text-gray-500">Soft comfort 🛏️</p>

        <button onclick="addToCart('Pet Bed')"
        class="mt-4 bg-pink-500 text-white px-6 py-3 rounded-xl w-full">
          Add to Cart
        </button>
      </div>

    </div>
  </div>
</section>

<!-- FLOATING CART -->
<div class="fixed bottom-6 right-6 z-50">
  <button onclick="toggleCart()"
  class="bg-pink-500 text-white w-16 h-16 rounded-full shadow-xl text-2xl relative">

    🛒

    <span id="cartCount"
    class="absolute -top-2 -right-2 bg-black text-white text-xs w-6 h-6 flex items-center justify-center rounded-full">
      0
    </span>

  </button>
</div>

<!-- CART MODAL -->
<div id="cartModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">

  <div class="bg-white w-[90%] max-w-md rounded-2xl p-6">

    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold">Your Cart 🛒</h2>
      <button onclick="toggleCart()" class="text-red-500 text-xl">X</button>
    </div>

    <ul id="cartItems" class="space-y-2"></ul>

    <button class="mt-6 w-full bg-pink-500 text-white py-3 rounded-xl">
      Checkout
    </button>

  </div>
</div>

<!-- SCRIPT -->
<script>

let cart = [];

function addToCart(item) {
  cart.push(item);
  updateCart();
}

function updateCart() {
  document.getElementById("cartCount").innerText = cart.length;

  let list = document.getElementById("cartItems");
  list.innerHTML = "";

  cart.forEach((item, index) => {
    list.innerHTML += `
      <li class="flex justify-between bg-gray-100 p-2 rounded-lg">
        ${item}
        <button onclick="removeItem(${index})" class="text-red-500">x</button>
      </li>
    `;
  });
}

function removeItem(index) {
  cart.splice(index, 1);
  updateCart();
}

function toggleCart() {
  document.getElementById("cartModal").classList.toggle("hidden");
}

</script>

</body>
</html>
